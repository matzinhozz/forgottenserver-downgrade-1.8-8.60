name: Lua syntax check, lint, and format

on:
  push:
    branches:
      - main
      - "v*"
    paths:
      - ".github/workflows/lua-check.yml"
      - "config.lua.dist"
      - "data/**/*.lua"

  pull_request:
    branches:
      - main
      - "v*"
    paths:
      - ".github/workflows/lua-check.yml"
      - "config.lua.dist"
      - "data/**/*.lua"

  workflow_dispatch:

concurrency:
  group: lua-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  luac:
    name: Lua syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Test Lua syntax
        run: |
          luac5.4 -p config.lua.dist
          find data/ -type f -name '*.lua' -print0 | xargs -0 -r -n1 luac5.4 -p

  lint:
    name: Lua lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [luac]
    continue-on-error: true

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 luarocks
          sudo luarocks install luacheck

      - name: Run Luacheck
        run: luacheck data config.lua.dist

  format:
    name: Lua format check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [luac]
    continue-on-error: true

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install LuaFormatter
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 luarocks cmake g++
          sudo luarocks install --server=https://luarocks.org/dev luaformatter

      - name: Check Lua formatting
        run: |
          find data/ -type f -name '*.lua' -print0 | xargs -0 -r -n1 luaformatter -i
          git diff
          git diff --exit-code
