name: Claude Code Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

  issue_comment:
    types:
      - created

  pull_request_review_comment:
    types:
      - created

  workflow_dispatch:

concurrency:
  group: claude-code-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude-review-disabled:
    name: Claude Code Review disabled
    runs-on: ubuntu-latest
    timeout-minutes: 5

    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.user.login == github.repository_owner) ||
      ((github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
       github.event.comment.user.login == github.repository_owner &&
       contains(github.event.comment.body, '@claude')) ||
      github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      pull-requests: read
      issues: read

    steps:
      - name: Claude Code Review disabled
        run: |
          echo "Claude Code Review is disabled."
          echo "This repository currently only allows GitHub-owned or Mateuzkl-owned actions."
          echo "anthropics/claude-code-action@v1 is blocked by repository Actions permissions."
          echo "Use CodeRabbit for now, or enable third-party actions in repository settings if Claude is needed later."
