name: Build (Linux & Windows)

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feat/**'
    paths:
      - 'src/**'
      - 'cmake/**'
      - CMakeLists.txt
      - vcpkg.json
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'cmake/**'
      - CMakeLists.txt
      - vcpkg.json
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (Ubuntu 24.04, GCC, Release)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install apt dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            cmake ninja-build build-essential pkg-config \
            gcc g++ \
            libssl-dev zlib1g-dev libfmt-dev libspdlog-dev \
            libpugixml-dev libabsl-dev \
            libasio-dev \
            default-libmysqlclient-dev

      - name: Build Lua 5.5 from source
        run: |
          curl -sSL https://www.lua.org/ftp/lua-5.5.0.tar.gz -o lua.tar.gz
          echo "96b01e9c463196bb96ee86c99249d0fdeab8d4b781f6bae7fdc60e7b43051b37 lua.tar.gz" | sha256sum -c
          tar xzf lua.tar.gz
          cd lua-5.5.0
          make -j$(nproc) linux-readline
          sudo make install INSTALL_TOP=/usr/local
          cd ..
          rm -rf lua-5.5.0 lua.tar.gz

      - name: Build simdutf from source
        run: |
          git clone --depth 1 --branch v6.4.1 https://github.com/simdutf/simdutf.git
          cd simdutf
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DSIMDUTF_TESTS=OFF \
            -DSIMDUTF_BENCHMARKS=OFF
          cmake --build build --parallel $(nproc)
          sudo cmake --install build
          cd ..
          rm -rf simdutf

      - name: Build mio from source
        run: |
          git clone --depth 1 --branch v1.0.0 https://github.com/mandreyel/mio.git
          cd mio
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build build
          sudo cmake --install build
          cd ..
          rm -rf mio

      - name: Configure CMake
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DENABLE_NATIVE_OPTIMIZATIONS=OFF
          -DENABLE_SLOW_TASK_DETECTION=OFF
          -DUSE_MIMALLOC=OFF
          -DSKIP_GIT=OFF

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Verify binary
        run: |
          file build/tfs
          ldd build/tfs

  windows:
    name: Windows (VS 2022, x64, Release)
    runs-on: windows-2022
    timeout-minutes: 40

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@5b984d559fb3e9b2c166e2bb83b9cdd1418ff930 # v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure CMake
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          -DENABLE_NATIVE_OPTIMIZATIONS=OFF
          -DENABLE_SLOW_TASK_DETECTION=OFF
          -DSKIP_GIT=OFF

      - name: Build
        run: cmake --build build --parallel $env:NUMBER_OF_PROCESSORS

      - name: Verify binary
        run: |
          Get-Item build\tfs.exe
