name: Build (Linux)

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feat/**'
    paths:
      - 'src/**'
      - 'cmake/**'
      - CMakeLists.txt
      - vcpkg.json
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'cmake/**'
      - CMakeLists.txt
      - vcpkg.json
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (Ubuntu 24.04, GCC, Release)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install apt dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            cmake ninja-build build-essential pkg-config \
            gcc g++ \
            libssl-dev zlib1g-dev libfmt-dev libspdlog-dev \
            libpugixml-dev libabsl-dev \
            libasio-dev \
            default-libmysqlclient-dev

      - name: Build Lua 5.5 from source
        run: |
          curl -sSL https://www.lua.org/ftp/lua-5.5.0.tar.gz -o lua.tar.gz
          echo "57ccc32bbbd005cab75bcc52444052535af691789dba2b9016d5c50640d68b3d lua.tar.gz" | sha256sum -c
          tar xzf lua.tar.gz
          cd lua-5.5.0
          make -j$(nproc) linux MYCFLAGS="-fPIC"
          sudo make install INSTALL_TOP=/usr/local
          cd ..
          rm -rf lua-5.5.0 lua.tar.gz

      - name: Build simdutf from source
        run: |
          git clone --depth 1 --branch v6.4.1 https://github.com/simdutf/simdutf.git
          cd simdutf
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DSIMDUTF_TESTS=OFF \
            -DSIMDUTF_BENCHMARKS=OFF
          cmake --build build --parallel $(nproc)
          sudo cmake --install build
          cd ..
          rm -rf simdutf

      - name: Build mio from source
        run: |
          git clone https://github.com/mandreyel/mio.git
          cd mio
          git checkout 8b6b7d878c89e81614d05edca7936de41ccdd2da
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build build
          sudo cmake --install build
          cd ..
          rm -rf mio

      - name: Configure CMake
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DENABLE_NATIVE_OPTIMIZATIONS=OFF
          -DENABLE_SLOW_TASK_DETECTION=OFF
          -DUSE_MIMALLOC=OFF
          -DSKIP_GIT=OFF
          -DLUA_INCLUDE_DIR=/usr/local/include
          -DLUA_LIBRARY=/usr/local/lib/liblua.a
          "-DLUA_LIBRARIES=/usr/local/lib/liblua.a;m;dl"
          -DLUA_VERSION_STRING=5.5.0

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Verify binary
        run: |
          file build/tfs
          ldd build/tfs

      - name: Upload artifact binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tfs-linux-${{ github.sha }}
          path: ${{ github.workspace }}/build/tfs
